# ---- Model ----
model:
  name_or_path: "/home/zcy/OPD/models/Qwen3-1.7B-Base"
  trust_remote_code: true
  torch_dtype: "bfloat16"
  gradient_checkpointing: true

# ---- Data ----
data:
  train_file: "data/processed/openr1_math_grpo_train.jsonl"
  eval_file: "data/processed/openr1_math_grpo_eval.jsonl"

# ---- LoRA ----
# Using same rank as SFT for fair comparison.
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# ---- GRPO hyperparameters ----
grpo:
  num_generations: 8           # completions per prompt per step
  num_generations_eval: 4      # same for eval

  max_prompt_length: 2069      # covers 99.995% of prompts (p99=328, max=2069)
  max_completion_length: 2048  # compromise: clipped_ratio ~0.10-0.15; vLLM GPU0 VRAM is close to full on RTX3090.

  temperature: 1.0             # sampling temperature for training generations
  top_p: 1.0                   # nucleus sampling

  beta: 0.01                   # KL penalty coefficient
  generation_batch_size: 56    # Must be divisible by num_generations=8; matches effective train batch after grad_acc.
  
  log_completions: false        # log sample completions to tensorboard
  num_completions_to_print: 0  # how many completions to log

  use_vllm: true
  vllm_mode: "server"              # server: vLLM runs as standalone process; training env still needs vllm import
  vllm_server_host: "127.0.0.1"
  vllm_server_port: 8000
  vllm_gpu_memory_utilization: 0.3 # only used in colocate mode
  vllm_tensor_parallel_size: 1     # TP per vLLM instance (set in both colocate config & server launch)
  
  loss_type: "dapo"
  mask_truncated_completions: true  # (if true, completions that hit max_completion_length are masked out of reward and loss to avoid penalising valid long answers)
  
# ---- Reward ----
reward:
  # Reward components: format_reward (has \boxed{}?) + correctness_reward (answer match?)
  # correctness_reward uses math_verify first, then falls back to normalized string matching.
  # This handles equivalent expressions such as "1/2", "\frac{1}{2}", and "0.5".
  reward_weights: [0.1, 1.0]          # null = equal weight for both reward functions
  scale_rewards: "group"        # normalise rewards within each prompt group

# ---- Training ----
training:
  bf16: true
  fp16: false

  # Effective train batch = per_device(2) × grad_acc(4) × 7 GPUs = 56 completions/update.
  # With num_generations=8, this corresponds to 56 / 8 = 7 distinct prompts/update.
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4

  learning_rate: 2.0e-5

  lr_scheduler_type: "cosine"
  warmup_steps: 50
  weight_decay: 0.0

  optim: "adamw_torch"
  max_grad_norm: 1.0

  logging_steps: 5

  # Evaluation — disabled during training to save GPU time.
  # Eval data is preserved for external post-training evaluation.
  eval_strategy: "no"
  per_device_eval_batch_size: 4

  # Checkpoint saving
  save_strategy: "steps"
  save_steps: 100              # checkpoint every 100 steps (~7 per 700-step run)
  save_total_limit: 8

  seed: 42
  dataloader_num_workers: 2

  # Data limits
  max_train_samples: 20000     # 20k subset; with 7 prompts/update, 1000 steps ≈ 7000 prompts ≈ 0.35 epoch.
  max_eval_samples: 500

  max_steps: 1000               # 1000 updates ≈ 7000 distinct prompts; 1 epoch over 20k would be ≈2857 updates.

# ---- DeepSpeed ZeRO-2 ----
deepspeed:
  train_micro_batch_size_per_gpu: 2   # must match per_device_train_batch_size
  zero_optimization:
    stage: 2
  bf16:
    enabled: true
  gradient_clipping: 1.0
  steps_per_print: 10

# ---- Output ----
output:
  dir: "outputs/grpo/qwen3_1.7b_openr1"
