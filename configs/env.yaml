# OPD/GRPO 项目 — 环境配置记录
# 生成日期: 2026-06-08
# 服务器: Ubuntu 24.04.2 LTS, 64 cores, 247 GB RAM
# GPU: 8x NVIDIA GeForce RTX 3090 (24 GB VRAM each, 192 GB total)
# NVIDIA Driver: 580.105.08, CUDA Driver: 13.0

server:
  os: Ubuntu 24.04.2 LTS
  kernel: 6.8.0-124-generic
  cpu_cores: 64
  ram_gb: 247
  disk_total: 3.5T
  disk_available: ~991G

gpu:
  count: 8
  model: NVIDIA GeForce RTX 3090
  vram_per_gpu_gb: 24
  total_vram_gb: 192
  driver_version: "580.105.08"
  cuda_driver_version: "13.0"

# ---------- 训练环境 ----------
conda_envs:
  # -- SFT / OPD 蒸馏训练 --
  opd-train:
    python: "3.11.15"
    pytorch: "2.12.0+cu126"
    cuda_toolkit: "12.6"
    transformers: "5.10.2"
    datasets: "5.0.0"
    accelerate: "1.13.0"
    peft: "0.19.1"
    trl: "1.5.1"
    deepspeed: "0.19.1"
    sentencepiece: "0.2.1"
    evaluate: "0.4.6"
    tensorboard: "2.20.0"
    wandb: "0.27.2"
    einops: "0.8.2"
    cudnn: "9.10.2"
    triton: "3.7.0"
    notes: >
      用于 SFT 训练和 OPD 蒸馏训练。
      GRPOTrainer 可用: trl.trainer.grpo_trainer.GRPOTrainer

  # -- GRPO vLLM 推理（reward model） --
  opd-vllm-trl:
    python: "3.11.15"
    pytorch: "2.10.0"
    vllm: "0.19.0"
    accelerate: "1.14.0"
    transformers: "4.57.6"
    trl: "1.6.0"
    notes: >
      用于 GRPO 训练时，trl.GRPOTrainer 通过 vLLM 加载 reward model 进行推理。
      训练脚本开头: conda activate opd-vllm-trl

  # -- GRPO 训练（含 vLLM 客户端） --
  opd-train-vllm:
    python: "3.11.15"
    pytorch: "2.10.0"
    vllm: "0.19.0"
    accelerate: "1.13.0"
    peft: "0.19.1"
    deepspeed: "0.19.1"
    transformers: "4.57.6"
    trl: "1.6.0"
    notes: >
      用于 GRPO 训练，需 vLLM 客户端库以便与 reward model 通信。
      由 opd-train 克隆并安装 vLLM: conda create --name opd-train-vllm --clone opd-train
      训练脚本开头: conda activate opd-train-vllm

  # -- 教师模型推理（已废弃，未使用） --
  opd-vllm:
    python: "3.11.15"
    vllm: "0.22.1"
    pytorch: "2.11.0+cu130"
    cuda_toolkit: "13.0"
    status: deprecated
    notes: >
      预留给 OPD 教师模型推理，实际未使用。
      OPD 教师推理走 opd-train 环境本地加载 32B 模型。

# ---------- HuggingFace 配置 ----------
huggingface:
  endpoint: "https://hf-mirror.com"         # huggingface.co DNS 不可达，必须使用镜像
  hf_home: "/home/zcy/OPD/models/hf_home"
  hf_hub_cache: "/home/zcy/OPD/models/hub"
  transformers_cache: "/home/zcy/OPD/models/transformers"
  hf_datasets_cache: "/home/zcy/OPD/data/hf_datasets"
  download_command: |
    export HF_ENDPOINT=https://hf-mirror.com
    hf download Qwen/Qwen3-8B-Base --local-dir /home/zcy/OPD/models/Qwen3-8B-Base

# ---------- 已下载资源 ----------
resources:
  models:
    - path: "/home/zcy/OPD/models/Qwen3-8B-Base"
      source: "Qwen/Qwen3-8B-Base"
      size_gb: 16
      role: 学生模型
  datasets:
    - path: "/home/zcy/OPD/data/hf_datasets/"
      source: "HuggingFaceH4/MATH-500"
      role: 评估集
